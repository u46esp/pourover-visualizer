<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pourover Visualizer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #fafafa;
        color: #18181b;
      }
      #app-shell {
        display: flex;
        flex-direction: row;
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
      #controls-panel {
        width: 280px;
        flex-shrink: 0;
        box-sizing: border-box;
        padding: 16px;
        border-right: 1px solid #e4e4e7;
        background: #f4f4f5;
        color: #18181b;
        font: 14px system-ui, sans-serif;
      }
      #visualizer {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }
      #canvas-host {
        flex: 1;
        min-width: 0;
        min-height: 0;
        position: relative;
        background: #fafafa;
      }
      #time-bar {
        flex-shrink: 0;
        box-sizing: border-box;
        min-height: 72px;
        padding: 12px 16px;
        border-top: 1px solid #e4e4e7;
        background: #f4f4f5;
        color: #18181b;
        font: 14px system-ui, sans-serif;
      }
      .time-bar-inner {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        max-width: 100%;
      }
      .time-bar-play {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 5rem;
        height: 2.5rem;
        padding: 0;
        border: 1px solid #d4d4d8;
        border-radius: 6px;
        background: #ffffff;
        color: #18181b;
        font: inherit;
        font-size: 1rem;
        line-height: 1;
        cursor: pointer;
      }
      .time-bar-play:hover {
        background: #fafafa;
      }
      .time-bar-slider {
        flex: 1;
        min-width: 0;
        height: 1.25rem;
        accent-color: #2563eb;
      }
      .time-bar-readout {
        flex-shrink: 0;
        font-variant-numeric: tabular-nums;
        color: #52525b;
        min-width: 7.5rem;
        text-align: right;
      }
      @media (max-width: 640px) {
        #app-shell {
          flex-direction: column;
        }
        #controls-panel {
          width: 100%;
          border-right: none;
          border-bottom: 1px solid #e4e4e7;
        }
        #visualizer {
          flex: 1;
          min-height: 0;
        }
      }
    </style>
  </head>
  <body>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
