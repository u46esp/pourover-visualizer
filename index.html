<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pourover Visualizer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #fafafa;
        color: #18181b;
      }
      #app-shell {
        display: flex;
        flex-direction: row;
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
      #controls-panel {
        width: 280px;
        flex-shrink: 0;
        box-sizing: border-box;
        padding: 16px;
        border-right: 1px solid #e4e4e7;
        background: #f4f4f5;
        color: #18181b;
        font: 14px system-ui, sans-serif;
      }
      #visualizer {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }
      #canvas-host {
        flex: 1;
        min-width: 0;
        min-height: 0;
        position: relative;
        background: #fafafa;
      }
      #time-bar {
        flex-shrink: 0;
        box-sizing: border-box;
        min-height: 72px;
        padding: 12px 16px;
        border-top: 1px solid #e4e4e7;
        background: #f4f4f5;
        color: #18181b;
        font: 14px system-ui, sans-serif;
      }
      @media (max-width: 640px) {
        #app-shell {
          flex-direction: column;
        }
        #controls-panel {
          width: 100%;
          border-right: none;
          border-bottom: 1px solid #e4e4e7;
        }
        #visualizer {
          flex: 1;
          min-height: 0;
        }
      }
    </style>
  </head>
  <body>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
